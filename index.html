<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아침 뉴스 브리핑</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); padding: 40px 30px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none; }
        h1 { font-family: 'Noto Serif KR', serif; font-size: 42px; font-weight: 900; color: white; letter-spacing: -1px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); position: relative; z-index: 1; }
        .subtitle { font-size: 16px; color: rgba(255,255,255,0.9); margin-top: 10px; position: relative; z-index: 1; }
        .last-update { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 15px; position: relative; z-index: 1; }
        .refresh-btn { position: absolute; top: 30px; right: 30px; background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.5); border-radius: 12px; padding: 12px 20px; cursor: pointer; color: white; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; backdrop-filter: blur(10px); z-index: 2; }
        .refresh-btn:hover:not(:disabled) { background: rgba(255,255,255,0.4); transform: translateY(-2px); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .refresh-icon { width: 18px; height: 18px; }
        .refresh-icon.spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading { text-align: center; padding: 60px 20px; background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(46, 60, 80, 0.2); border-top: 4px solid #2c3e50; border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px; }
        .newspaper-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: all 0.3s ease; border: 3px solid rgba(46, 60, 80, 0.1); }
        .newspaper-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .newspaper-header { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 3px solid; }
        .newspaper-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 700; font-family: 'Noto Serif KR', serif; }
        .newspaper-name { font-family: 'Noto Serif KR', serif; font-size: 24px; font-weight: 700; color: #2c3e50; }
        .news-item { padding: 16px; border-radius: 12px; border-left: 4px solid; margin-bottom: 15px; transition: all 0.2s ease; cursor: pointer; }
        .news-item:hover { transform: translateX(4px); }
        .news-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; color: #2c3e50; line-height: 1.5; margin-bottom: 8px; }
        .news-summary { font-size: 14px; color: #666; line-height: 1.6; }
        .news-date { font-size: 12px; color: #999; margin-top: 8px; }
        .no-news { text-align: center; color: #999; font-size: 14px; padding: 40px 20px; }
        @media (max-width: 768px) { h1 { font-size: 32px; } .refresh-btn { position: static; margin-top: 20px; } .news-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>아침 뉴스 브리핑</h1>
            <div class="subtitle">조선 · 중앙 · 동아 주요 뉴스</div>
            <div class="last-update" id="lastUpdate"></div>
            <button class="refresh-btn" id="refreshBtn" onclick="loadAllNews()">
                <svg class="refresh-icon" id="refreshIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                새로고침
            </button>
        </header>
        <div id="content"></div>
    </div>
    <script>
        const newspapers = [{name:'조선일보',color:'#e74c3c',feed:'https://www.chosun.com/arc/outboundfeeds/rss/'},{name:'중앙일보',color:'#3498db',feed:'https://www.joongang.co.kr/rss/allArticle.xml'},{name:'동아일보',color:'#27ae60',feed:'https://rss.donga.com/total.xml'}];
        
        async function fetchRSS(url){
            try{
                const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                const d=await r.json();
                return d.items?d.items.slice(0,5).map(i=>({title:i.title||'',summary:(i.description||'').replace(/<[^>]*>/g, '').substring(0,150)+'...',link:i.link||'',date:i.pubDate?new Date(i.pubDate).toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):''})):[];
            }catch(e){return [];}
        }
        
        async function loadAllNews(){
            const c=document.getElementById('content'),b=document.getElementById('refreshBtn'),i=document.getElementById('refreshIcon');
            b.disabled=true;i.classList.add('spinning');
            c.innerHTML='<div class="loading"><div class="spinner"></div><p>뉴스를 불러오는 중...</p></div>';
            let html='<div class="news-grid">';
            for(const n of newspapers){
                const news=await fetchRSS(n.feed);
                html+=`<div class="newspaper-card" style="border-color:${n.color}20"><div class="newspaper-header" style="border-color:${n.color}"><div class="newspaper-icon" style="background:linear-gradient(135deg,${n.color} 0%,${n.color}dd 100%);box-shadow:0 4px 12px ${n.color}40">${n.name.charAt(0)}</div><div class="newspaper-name">${n.name}</div></div>`;
                if(news.length>0){
                    news.forEach(item=>{html+=`<div class="news-item" style="background:${n.color}08;border-color:${n.color}" onclick="window.open('${item.link}','_blank')" onmouseover="this.style.background='${n.color}15'" onmouseout="this.style.background='${n.color}08'"><div class="news-title">${item.title}</div><div class="news-summary">${item.summary}</div><div class="news-date">${item.date}</div></div>`;});
                }else{html+='<div class="no-news">뉴스를 불러올 수 없습니다</div>';}
                html+='</div>';
            }
            c.innerHTML=html+'</div>';
            document.getElementById('lastUpdate').textContent=`마지막 업데이트: ${new Date().toLocaleTimeString('ko-KR')}`;
            b.disabled=false;i.classList.remove('spinning');
        }
        window.onload=()=>loadAllNews();
    </script>
</body>
</html>
